<section id="signup" class="signup section">
  <div class="container" data-aos="fade-up">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card signup-card shadow-lg border-0">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <div class="signup-icon mb-3">
                <i class="bi bi-person-plus-fill display-1 text-success"></i>
              </div>
              <h2 class="fw-bold">Kayıt Ol</h2>
              <p class="text-muted">Kütüphane rezervasyon sistemine katılın</p>
            </div>

            <form (ngSubmit)="onSignup()">
              <div class="mb-3">
                <label for="studentNumber" class="form-label fw-bold">
                  <i class="bi bi-person-badge text-success me-2"></i>Öğrenci Numarası
                </label>
                <input type="text" class="form-control" id="studentNumber" [(ngModel)]="user.studentNumber" name="studentNumber" required placeholder="Örn: 123456">
              </div>
              <div class="mb-3">
                <label for="fullName" class="form-label fw-bold">
                  <i class="bi bi-person-fill text-success me-2"></i>Ad Soyad
                </label>
                <input type="text" class="form-control" id="fullName" [(ngModel)]="user.fullName" name="fullName" required placeholder="Ad Soyadınız">
              </div>
              <div class="mb-3">
                <label for="email" class="form-label fw-bold">
                  <i class="bi bi-envelope-fill text-success me-2"></i>E-posta
                </label>
                <input type="email" class="form-control" id="email" [(ngModel)]="user.email" name="email" required placeholder="ornek@sakarya.edu.tr">
              </div>
              <div class="mb-3">
                <label for="academicLevel" class="form-label fw-bold">
                  <i class="bi bi-mortarboard-fill text-success me-2"></i>Akademik Seviye
                </label>
                <select class="form-select" id="academicLevel" [(ngModel)]="user.academicLevel" name="academicLevel">
                  <option value="Lisans">📚 Lisans</option>
                  <option value="YüksekLisans">🎓 Yüksek Lisans</option>
                  <option value="Doktora">🎯 Doktora</option>
                  <option value="Akademisyen">👨‍🏫 Akademisyen</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="facultyId" class="form-label fw-bold">
                  <i class="bi bi-building text-success me-2"></i>Fakülte
                </label>
                <select class="form-select" id="facultyId" [(ngModel)]="user.facultyId" name="facultyId" required>
                  <option [value]="0" disabled>Fakülte seçiniz</option>
                  <option *ngFor="let faculty of faculties" [value]="faculty.id">
                    {{ faculty.name }}
                  </option>
                </select>
              </div>
              <div class="mb-3">
                <label for="department" class="form-label fw-bold">
                  <i class="bi bi-bookmark-fill text-success me-2"></i>Bölüm
                </label>
                <input type="text" class="form-control" id="department" [(ngModel)]="user.department" name="department" required placeholder="Örn: Bilgisayar Mühendisliği">
              </div>
              <div class="mb-4">
                <label for="password" class="form-label fw-bold">
                  <i class="bi bi-lock-fill text-success me-2"></i>Şifre
                </label>
                <input type="password" class="form-control" id="password" [(ngModel)]="user.password" name="password" required placeholder="En az 6 karakter">
              </div>
              <button type="submit" class="btn btn-success btn-lg w-100 mb-3">
                <i class="bi bi-check-circle me-2"></i>Kayıt Ol
              </button>
              <div class="text-center">
                <p class="mb-0">Zaten hesabınız var mı? <a routerLink="/login" class="fw-bold text-decoration-none">Giriş Yap</a></p>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
