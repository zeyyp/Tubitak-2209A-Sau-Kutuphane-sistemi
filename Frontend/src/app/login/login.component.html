<section id="login" class="login section">
  <div class="container" data-aos="fade-up">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="card login-card shadow-lg border-0">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <div class="login-icon mb-3">
                <i class="bi bi-person-circle display-1 text-primary"></i>
              </div>
              <h2 class="fw-bold">Hoş Geldiniz</h2>
              <p class="text-muted">Rezervasyon yapabilmek için giriş yapınız</p>
            </div>

            <form (ngSubmit)="onLogin()">
              <div class="mb-4">
                <label for="studentNumber" class="form-label fw-bold">
                  <i class="bi bi-person-badge text-primary me-2"></i>Öğrenci Numarası
                </label>
                <input type="text" class="form-control form-control-lg" id="studentNumber" [(ngModel)]="studentNumber" name="studentNumber" required placeholder="Örn: 123456">
              </div>
              <div class="mb-4">
                <label for="password" class="form-label fw-bold">
                  <i class="bi bi-lock-fill text-primary me-2"></i>Şifre
                </label>
                <input type="password" class="form-control form-control-lg" id="password" [(ngModel)]="password" name="password" required placeholder="••••••••">
              </div>
              <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" [disabled]="isLoading">
                <i class="bi bi-box-arrow-in-right me-2"></i>
                {{ isLoading ? 'Giriş yapılıyor...' : 'Giriş Yap' }}
              </button>
              <div class="text-center">
                <p class="mb-0">Hesabınız yok mu? <a routerLink="/signup" class="fw-bold text-decoration-none">Kayıt Ol</a></p>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
